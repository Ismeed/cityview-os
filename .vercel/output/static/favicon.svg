<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Green Swirl Background -->
  <path d="M 33,20 C 33,8.5 25.5,4 17,4 C 8.5,4 3,11 3,20 C 3,28.5 9,33.5 17.5,33.5" stroke="#0E8A3E" stroke-width="2" stroke-linecap="round" fill="none" />
  
  <!-- City Skyline Silhouette (Three Buildings) -->
  <rect x="10" y="11" width="3.5" height="11" fill="#2ECC71" rx="0.5" />
  <rect x="14.5" y="7" width="4.5" height="15" fill="#0E8A3E" rx="0.5" />
  <rect x="20" y="13" width="3.5" height="9" fill="#2ECC71" rx="0.5" />
  
  <!-- CNG Diamond Emblem -->
  <polygon points="33,12 37,15.5 33,19 29,15.5" fill="#0D47A1" stroke="#0E8A3E" stroke-width="1" />
  <text x="33" y="17.2" font-size="3.8" font-family="sans-serif" font-weight="900" fill="#0E8A3E" text-anchor="middle">CNG</text>

  <!-- Blue and Green Swooshes / Road & Leaf Path at bottom -->
