  <path d="M 12,29.5 C 18,33 27.5,32 33.5,24.5 C 27.5,28.5 18,27.5 13,23 Z" fill="#2ECC71" />
  
  <!-- The Keke Vehicle in the Center -->
  <!-- Body -->
  <path d="M 13.5,22 L 13.5,17 C 13.5,15 15,14 18,14 C 21,14 22.5,15 22.5,17 L 22.5,22 Z" fill="#0D47A1" />
  <path d="M 14.5,18 L 21.5,18 L 20.5,22 L 15.5,22 Z" fill="#0E8A3E" />
  <!-- Windshield -->
  <rect x="15" y="15" width="6" height="2.5" fill="#E5E7EB" rx="0.3" />
  <!-- Headlights -->
  <circle cx="15.5" cy="20.5" r="0.75" fill="#FBBF24" />
  <circle cx="20.5" cy="20.5" r="0.75" fill="#FBBF24" />
  <!-- Front Grill -->
  <rect x="17.2" y="19" width="1.6" height="2" fill="#1F2937" rx="0.2" />
